Name: prd_aws-graphrag
SchemaVersion: "1.0"

# Optional - Set automatic triggers.
Triggers:
  - Type: PUSH
    Branches:
      - main

Actions:
  # -------------------------------------------------------------------------
  # Action 1: Security Scan (ASH)
  # -------------------------------------------------------------------------
  ASHSecurityScan:
    Identifier: aws/build@v1.0.0
    Inputs:
      Sources:
        - WorkflowSource
    Outputs:
      AutoDiscoverReports:
        Enabled: false
        ReportNamePrefix: security-scan
      Artifacts:
        - Name: AshScanResultsHTML
          Files:
            - .ash/ash_output/reports/ash.html
      Reports:
        SecurityIssues:
          IncludePaths:
            - .ash/ash_output/reports/ash.sarif
          Format: SARIFSA
    Configuration:
      Steps:
        - Run: |
            set -e # Exit immediately if a command exits with a non-zero status
            
            echo "=== Installing Dependencies ==="
            
            # 1. Install uv
            curl -LsSf https://astral.sh/uv/install.sh | sh
            source $HOME/.local/bin/env

            # 2. Install grype & syft
            curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin
            curl -sSfL https://get.anchore.io/syft | sh -s -- -b /usr/local/bin

            # 3. Install cfn-nag (Ruby based)
            sudo yum install -y gcc make ruby-devel
            gem install cfn-nag

            # 4. Install Node.js (LTS)
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install --lts

            echo "=== Starting ASH Scan ==="
            alias ash="uvx git+https://github.com/awslabs/automated-security-helper.git@v3.1.2"
            
            # The build succeeds even if findings are detected due to --no-fail-on-findings option
            ash --source-dir . --no-fail-on-findings

      Container:
        Registry: CODECATALYST
        Image: CodeCatalystLinux_x86_64:2024_03
    Compute:
      Type: EC2
      Fleet: Linux.x86-64.Large

  # -------------------------------------------------------------------------
  # Action 2: License & Copyright Check
  # -------------------------------------------------------------------------
  LicenseAndCopyright:
    Identifier: aws/build@v1.0.0
    Inputs:
      Sources:
        - WorkflowSource
    Outputs:
      Artifacts:
        - Name: ComplianceReport
          Files:
            - compliance-report.json
            - compliance-report.html
      Reports:
        CopyrightComplianceReport:
          Format: JUNITXML
          IncludePaths:
            - junit-report.xml
    Environment:
      Name: AWS_SBR_ENV_LMB
    Configuration:
      Steps:
        - Run: |
            set -e # Exit immediately if a command exits with a non-zero status

            # [FIX] Define configuration variables here using shell syntax
            S3_BUCKET="codecatalyst-sbr-compliance-result-ACCOUNT_ID"
            LAMBDA_FUNCTION="sbr-eng-sec-checker-lmb"
            AWS_REGION="us-west-2"

            echo "=== Python License Compliance Check ==="
            echo "Configuration:"
            echo "  S3 Bucket: $S3_BUCKET"
            echo "  Lambda Function: $LAMBDA_FUNCTION"
            echo "  AWS Region: $AWS_REGION"

            # Get repository name
            REPO_NAME=$(basename $(git config --get remote.origin.url) .git)
            echo "  Repository: $REPO_NAME"

            echo ""
            echo "=== Preparing Files ==="
            # Create file list
            find . -name "*.py" -type f > files.txt
            
            if [ ! -s files.txt ]; then
              echo "No Python files found. Exiting gracefully."
              exit 0
            fi

            if [ -f "requirements.txt" ]; then
              echo "requirements.txt" >> files.txt
              echo "Including requirements.txt"
            fi

            FILE_COUNT=$(wc -l < files.txt)
            echo "Found $FILE_COUNT file(s) to scan."

            # Create tar.gz archive
            TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
            ARCHIVE_FILE="compliance-check-${TIMESTAMP}.tar.gz"
            tar -czf "$ARCHIVE_FILE" -T files.txt

            echo "Archive created: $ARCHIVE_FILE"

            # Upload to S3
            echo ""
            echo "=== Uploading to S3 ==="
            S3_KEY="${REPO_NAME}/${ARCHIVE_FILE}"
            aws s3 cp "$ARCHIVE_FILE" "s3://${S3_BUCKET}/${S3_KEY}" --region "$AWS_REGION"

            # Invoke Lambda
            echo ""
            echo "=== Invoking Lambda ==="
            PAYLOAD=$(jq -n \
              --arg bucket "$S3_BUCKET" \
              --arg key "$S3_KEY" \
              --arg repo "$REPO_NAME" \
              --arg timestamp "$TIMESTAMP" \
              '{s3_bucket: $bucket, s3_key: $key, repository: $repo, timestamp: $timestamp}')

            aws lambda invoke \
              --function-name "$LAMBDA_FUNCTION" \
              --cli-binary-format raw-in-base64-out \
              --payload "$PAYLOAD" \
              --region "$AWS_REGION" \
              response.json

            echo "Lambda invocation completed."
            # Check Lambda response (Fail the build if FunctionError exists)
            if grep -q "FunctionError" response.json; then
              echo "Lambda Execution Failed:"
              cat response.json
              exit 1
            fi

            # Download reports from S3
            echo ""
            echo "=== Downloading Reports ==="
            REPORT_PREFIX="${REPO_NAME}/reports/${TIMESTAMP}"

            # Attempt to download files (log warning if failed, but don't break unless necessary)
            aws s3 cp "s3://${S3_BUCKET}/${REPORT_PREFIX}/compliance-report.json" compliance-report.json --region "$AWS_REGION" || echo "Warning: compliance-report.json not found"
            aws s3 cp "s3://${S3_BUCKET}/${REPORT_PREFIX}/compliance-report.html" compliance-report.html --region "$AWS_REGION" || echo "Warning: compliance-report.html not found"
            aws s3 cp "s3://${S3_BUCKET}/${REPORT_PREFIX}/junit-report.xml" junit-report.xml --region "$AWS_REGION" || echo "Warning: junit-report.xml not found"

            echo "Download process finished."
            ls -lh compliance-report.* junit-report.xml 2>/dev/null || echo "No reports downloaded."