# GitLab CI for aws-graphrag (code.aws.dev).
# Runs on merge requests and on pushes to the default branch.
#
# Stages:
#   quality  - lint / format / typecheck / tests + coverage (blocking)
#   security - Automated Security Helper scan (non-blocking, reports only)
#
# The legacy CodeCatalyst license/copyright check (which invoked an internal
# AWS Lambda) is provided as an opt-in job that runs only when the AWS
# credential CI/CD variables are configured for this project.

stages:
  - quality
  - security

# Official uv image bundles uv + Python (no curl/pip bootstrap needed); the
# slim Debian base used by python:3.x-slim ships without curl, which broke the
# previous uv-install step.
default:
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  UV_LINK_MODE: copy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Quality gate: lint, format, import order, type check, tests + coverage.
# ---------------------------------------------------------------------------
quality:
  stage: quality
  before_script:
    # git is required by isort's skip detection (`git ls-files`); the slim uv
    # image does not bundle it.
    - apt-get update && apt-get install -y --no-install-recommends git
    - uv sync --extra dev
  script:
    - uv run ruff check aws_graphrag tests
    - uv run black --check aws_graphrag tests
    - uv run isort --check-only aws_graphrag tests
    - uv run mypy aws_graphrag
    # The `aws` marker gates tests needing real AWS services; excluded in CI.
    # Coverage floor ratchets up toward the 80% target as the suite grows.
    - >-
      uv run pytest -m "not aws"
      --cov=aws_graphrag --cov-report=term-missing
      --cov-report=xml:coverage.xml --junitxml=report.xml
      --cov-fail-under=30
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# ---------------------------------------------------------------------------
# Security scan: Automated Security Helper (ASH). Reports only, never blocks.
# ---------------------------------------------------------------------------
security_scan:
  stage: security
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  needs: []
  allow_failure: true
  before_script:
    # ASH is installed from a git ref via uvx; the slim uv image lacks git.
    - apt-get update && apt-get install -y --no-install-recommends git
  script:
    - >-
      uvx git+https://github.com/awslabs/automated-security-helper.git@v3.1.2
      --source-dir . --no-fail-on-findings
  artifacts:
    when: always
    paths:
      - .ash/ash_output/reports/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# License & copyright compliance (opt-in). Mirrors the legacy CodeCatalyst
# action: archives Python sources, hands them to the internal compliance
# Lambda, and downloads the report. Runs only when AWS access is configured
# via CI/CD variables (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY or a role),
# COMPLIANCE_S3_BUCKET, and COMPLIANCE_LAMBDA.
# ---------------------------------------------------------------------------
license_check:
  stage: security
  image: python:3.12
  needs: []
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $COMPLIANCE_S3_BUCKET
  before_script:
    - pip install --quiet awscli
  script:
    - AWS_REGION="${AWS_REGION:-us-west-2}"
    - REPO_NAME="${CI_PROJECT_NAME}"
    - find . -path ./.venv -prune -o -name "*.py" -type f -print > files.txt
    - TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
    - ARCHIVE="compliance-check-${TIMESTAMP}.tar.gz"
    - tar -czf "$ARCHIVE" -T files.txt
    - S3_KEY="${REPO_NAME}/${ARCHIVE}"
    - aws s3 cp "$ARCHIVE" "s3://${COMPLIANCE_S3_BUCKET}/${S3_KEY}" --region "$AWS_REGION"
    - >-
      PAYLOAD=$(python -c "import json,sys;
      print(json.dumps({'s3_bucket': sys.argv[1], 's3_key': sys.argv[2],
      'repository': sys.argv[3], 'timestamp': sys.argv[4]}))"
      "$COMPLIANCE_S3_BUCKET" "$S3_KEY" "$REPO_NAME" "$TIMESTAMP")
    - >-
      aws lambda invoke --function-name "$COMPLIANCE_LAMBDA"
      --cli-binary-format raw-in-base64-out --payload "$PAYLOAD"
      --region "$AWS_REGION" response.json
    - if grep -q "FunctionError" response.json; then cat response.json; exit 1; fi
  artifacts:
    when: always
    paths:
      - response.json
    expire_in: 1 week
