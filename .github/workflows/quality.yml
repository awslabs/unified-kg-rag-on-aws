name: quality

# Lint / format / import-order / type-check / tests + coverage.
# Mirrors the pre-commit gate; runs on PRs and pushes to the default branch.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check unified_kg_rag tests

      - name: Black (format check)
        run: uv run black --check unified_kg_rag tests

      - name: isort (import order)
        run: uv run isort --check-only unified_kg_rag tests

      - name: mypy (type check)
        run: uv run mypy unified_kg_rag

      - name: pytest + coverage
        # The `aws` marker gates tests needing real AWS services; excluded in CI.
        # The coverage floor ratchets up toward the 80% target as the suite grows.
        run: >-
          uv run pytest -m "not aws"
          --cov=unified_kg_rag --cov-report=term-missing
          --cov-report=xml:coverage.xml --junitxml=report.xml
          --cov-fail-under=75
