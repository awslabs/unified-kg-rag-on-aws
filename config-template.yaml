# GraphRAG Framework Configuration

# AWS Configuration
aws:
  region_name: "ap-northeast-2"
  profile_name: null

  # Bedrock Configuration
  bedrock:
    region_name: "ap-northeast-2"
    assumed_role_arn: null
    enable_global_profile: true
    # Amazon Bedrock Guardrails (WAF security pillar). Disabled unless an
    # identifier is set; when set, every LLM call enforces the guardrail's
    # content/PII/grounding policies on prompts and completions.
    guardrail:
      identifier: null # Guardrail ID or ARN, e.g. "abcd1234efgh"
      version: "DRAFT" # "DRAFT" or a published version number
      trace: false # Emit guardrail trace for auditing/observability

  # Neptune Configuration
  neptune:
    endpoint: # Add endpoint here
    port: 8182
    use_iam: true

  # OpenSearch Configuration
  opensearch:
    endpoint: # Add endpoint here
    port: 443
    use_ssl: true
    verify_certs: true
    use_iam: false

  # S3 Configuration
  s3:
    bucket_name: # Add bucket name here
    encryption:
      encryption_type: "AES256"
      kms_key_id: null
  # DynamoDB document-status registry for incremental indexing. When enabled,
  # each indexing run diffs the corpus against this table (by content hash) and
  # only re-indexes new/changed documents, merging into the live graph.
  dynamodb:
    enabled: false
    table_name: "aws-graphrag-doc-status"
    create_table_if_missing: true
    billing_mode: "PAY_PER_REQUEST"

# Global Output Fixing Configuration
fixing:
  enabled: false
  fixing_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"

# Data Processing Configuration
processing:
  max_concurrency: 5
  batch_size: 10
  max_retries: 3
  ignore_errors: false
  deduplicate: true
  resolution_method: "minhash"
  similarity_threshold: 0.8

  # Document Parsing
  document_parsing:
    source_directory: # Add source directory here
    target_directory: null
    index_value: null

  # Text Chunking
  chunking:
    chunker_type: "intelligent"
    chunking_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    content_type: "markdown"
    min_chunk_size: 5000
    max_chunk_size: 50000
    chunk_overlap: 500
    pre_chunk_size: 50000
    pre_chunk_overlap: 500
    fallback_chunk_size: 50000
    max_marker_miss_rate: 0.1

  # Translation
  translation:
    translation_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    target_language: "en"
    additional_target_languages: null

  # Graph Extraction
  graph_extraction:
    extraction_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
    max_entities_per_chunk: 100
    max_relationships_per_chunk: 100
    entity_confidence_threshold: 0.0
    enable_confidence_extraction: true

  # Gleaning (Iterative Information Extraction)
  gleaning:
    enabled: true
    graph_refinement_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
    max_rounds: 3
    convergence_threshold: 0.8
    quality_threshold: 0.9
    min_improvement_threshold: 0.03
    max_entities_per_prompt: 200
    max_relationships_per_prompt: 200
    # Scaling constants for the count-based quality/convergence estimates
    # (defaults shown; tune per corpus scale rather than hardcoding).
    quality_completeness_weight: 0.6
    initial_quality_entity_scale: 50
    initial_quality_relationship_scale: 100
    convergence_change_scale: 20

  # Claim Extraction
  claim_extraction:
    extraction_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
    max_entities_per_prompt: 200

# Graph Configuration
graph:
  # Graph Analysis
  analysis:
    # Centrality calculations
    centrality:
      calculate_degree: true
      calculate_betweenness: true
      calculate_pagerank: true
      calculate_closeness: false
      calculate_eigenvector: false
      pagerank_alpha: 0.85
      pagerank_max_iter: 100
      betweenness_k: null
      eigenvector_max_iter: 1000
      eigenvector_tol: 0.001

    # Graph statistics
    statistics:
      calculate_density: true
      calculate_clustering: true
      calculate_diameter: false
      calculate_components: true

  # Community Detection
  community_detection:
    resolution: 1.0
    random_state: 42
    max_levels: 5
    trials: 3
    extra_forced_iterations: 2
    min_community_size: 3
    auto_resolution: true

    # Community report generation
    report_generation:
      enabled: true
      report_generation_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
      max_entities_per_report: 50
      summary_length: "medium"
      include_statistics: true
      include_key_entities: true

  # Graph Visualization
  visualization:
    enabled: true
    outputs_directory: "outputs/visualization"
    embedding_method: "node2vec"
    layout_method: "umap"

    # Interactive visualization settings
    interactive:
      node_size_range: [10, 50]
      edge_width_range: [1, 5]
      color_scheme: "community"
      show_labels: true
      physics_enabled: true

    # Static visualization settings
    static:
      figure_size: [12, 8]
      dpi: 300
      node_size: 100
      edge_width: 1.0

    # Layout settings
    layout:
      dimensions: 2
      n_neighbors: 15
      min_dist: 0.1
      spread: 1.0

# Indexing Configuration
indexing:
  reset: false
  additional_suffix: null

  # OpenSearch Indexing
  opensearch:
    embedding_model_id: "amazon.titan-embed-text-v2:0"
    embedding_dimension: null
    refresh_after_batch: true
    text_units_index_alias: "graphrag-text-units"
    entities_index_alias: "graphrag-entities"
    community_reports_index_alias: "graphrag-community-reports"
    # Relationship vector index — enables LightRAG high-level keyword retrieval
    # (mix/hybrid modes). Built automatically during indexing.
    relationships_index_prefix: "graphrag-relationships"
    # Text analyzer per language code (extend without code changes); unlisted
    # languages use default_analyzer.
    default_analyzer: "standard"
    language_analyzers:
      en: "english"
      ko: "nori"
    # Query clause budget — keep max_total_clauses under the cluster's
    # indices.query.bool.max_clause_count.
    max_query_size: 100
    terms_batch_size: 150
    max_total_clauses: 600
    reserved_clauses: 300

    # Index settings
    index_settings:
      number_of_shards: 1
      number_of_replicas: 0
      refresh_interval: "1s"

    # Vector search settings
    vector_search:
      ef_construction: 128
      m: 24
      ef_search: 100
      space_type: "cosinesimil"
      engine: "nmslib"

  # Neptune Indexing
  neptune:
    batch_size: 20
    max_retries: 3
    retry_delay_seconds: 2
    property_max_length: 1000

# Search Configuration
search:
  translation_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
  entity_extraction_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
  strategy_selection_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
  context_building_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
  answer_generation_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"

  # Hybrid search weights
  hybrid:
    lexical_weight: 0.5
    vector_weight: 0.5

  # Fusion Configuration
  fusion:
    method: "rrf"
    rrf_k: 60
    diversity_lambda: 0.5
    fusion_weights:
      lexical: 0.5
      vector: 0.5

  # Reranking Configuration
  reranking:
    enabled: true
    rerank_model_id: "cohere.rerank-v3-5:0"
    top_k: 100

  # LightRAG dual-level keyword search (mix/hybrid/naive modes)
  lightrag_search:
    # When keyword extraction yields nothing, a query shorter than this falls
    # back to using the raw query as a low-level keyword (0 disables the gate).
    raw_query_fallback_max_len: 50

  # Global Search Configuration
  global_search:
    community_relevance_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    map_reduce_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    max_communities: 10
    relevance_threshold: 0.5
    use_dynamic_selection: true
    enable_map_reduce: true

  # Drift Search Configuration
  drift_search:
    enable_query_refinement: true
    enable_keyword_extraction: true
    query_refinement_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    keyword_expansion_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    convergence_assessment_model_id: "anthropic.claude-haiku-4-5-20251001-v1:0"
    max_iterations: 3
    initial_top_k: 5
    summary_length: 5
    n_entities: 5
    convergence_threshold: 0.1
    improvement_threshold: 0.05

  # Token Manager Configuration
  token_manager:
    max_context_tokens: 200000
    token_count_cache_size: 1024

# Memory Configuration
memory:
  max_conversations: 100
  max_messages_per_conversation: 20
  max_conversation_age_hours: 168
  cleanup_interval_hours: 24
  auto_cleanup: true

# Cache Configuration
cache:
  ttl_seconds: null
  chunking:
    enabled: true
    chunk_size: 1000
    max_file_size_mb: 50

# Logging Configuration
logging:
  level: "INFO"
  log_format: "structured"
  log_to_file: true
  log_file_path: "logs/log.txt"

# Evaluation Configuration
evaluation:
  outputs_directory: "outputs/evaluation"
  embedding_model_id: "amazon.titan-embed-text-v2:0"
  evaluation_model_id: "anthropic.claude-sonnet-4-5-20250929-v1:0"
  enabled_evaluators:
    - langchain
    - ragas
  langchain_metrics:
    - correctness
    - partial_correctness
  ragas_metrics:
    - answer_correctness
    - answer_relevancy
    - context_precision
    - context_recall
    - faithfulness
  max_context_tokens: 200000
  save_detailed_results: true
  save_summary_only: false

# Custom Prompts Configuration
custom_prompts:
  # Graph Extraction Prompts
  graph_extraction_system: null
  graph_extraction_human: null

  # Claim Extraction Prompts
  claim_extraction_system: null
  claim_extraction_human: null

  # Graph Refinement Prompts
  graph_refinement_system: null
  graph_refinement_human: null

  # Community Report Prompts
  community_report_system: null
  community_report_human: null

  # Answer Generation Prompts
  answer_generation_system: null
  answer_generation_human: null

  # Context Building Prompts
  context_building_system: null
  context_building_human: null

  # Entity Extraction Prompts
  entity_extraction_system: null
  entity_extraction_human: null

  # Keyword Expansion Prompts
  keyword_expansion_system: null
  keyword_expansion_human: null

  # Query Refinement Prompts
  query_refinement_system: null
  query_refinement_human: null

  # Strategy Selection Prompts
  strategy_selection_system: null
  strategy_selection_human: null
