# Pre-commit hooks mirroring the CI quality gate (.github/workflows/quality.yml).
# Install with: pre-commit install
#
# ruff/black/isort/mypy all run via `uv run` against the project's own venv
# (language: system) rather than pre-commit's isolated, separately-pinned envs.
# This guarantees the hooks execute the *same* tool versions as CI's
# `uv run ruff/black/isort/mypy`, so a local pre-commit pass and CI never
# disagree because of version drift. Requires `uv sync --extra dev` first.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
        require_serial: true
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy unified_kg_rag
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
