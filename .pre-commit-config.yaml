# Pre-commit hooks mirroring the CI quality gate (.gitlab-ci.yml).
# Install with: pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black

  # mypy runs against the project's own venv (not an isolated pre-commit env) so
  # it sees the same dependencies/stubs as CI and reproduces `uv run mypy`.
  # Requires `uv sync --extra dev` first.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy aws_graphrag
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
